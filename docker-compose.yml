services:
  postgres:
    image: postgres:16
    container_name: voxara-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voxara
    volumes:
      - voxara_pgdata:/var/lib/postgresql/data

volumes:
  voxara_pgdata:
